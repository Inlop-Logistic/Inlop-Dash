<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INLOP · Nueva contraseña</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#04060e;--ink2:#080c18;--ink3:#0c1220;--ink4:#111828;
  --red:#c00613;--red2:#e0081a;--gold:#c8973a;--navy:#012A6B;
  --cyan:#00d4ff;--green:#00e676;
  --w0:#fff;--w1:#eef2f8;--w2:#b8c8dc;--w3:#6a8aaa;--w4:#3a506a;
  --line:rgba(255,255,255,.05);--line2:rgba(255,255,255,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--ink);font-family:'DM Sans',sans-serif;overflow-y:auto;color:var(--w1)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,212,255,.05) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 50% 100%,rgba(1,42,107,.12) 0%,transparent 55%);pointer-events:none;z-index:0}

.center{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;z-index:10;animation:fadeUp .6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.brand{display:flex;align-items:center;gap:12px;margin-bottom:40px}
.brand-hex{width:40px;height:40px;flex-shrink:0;background:linear-gradient(135deg,var(--navy),var(--red));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;color:#fff}
.brand-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:4px;text-transform:uppercase;color:var(--w0);line-height:1}
.brand-sub{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--w4);text-transform:uppercase;margin-top:3px}

.card{width:100%;max-width:420px;background:rgba(8,12,24,.85);border:1px solid var(--line2);border-radius:16px;padding:40px;position:relative;overflow:hidden;backdrop-filter:blur(20px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--navy),transparent)}
.card-corner{position:absolute;width:14px;height:14px}
.card-corner.tl{top:10px;left:10px;border-top:1.5px solid rgba(0,212,255,.3);border-left:1.5px solid rgba(0,212,255,.3)}
.card-corner.tr{top:10px;right:10px;border-top:1.5px solid rgba(0,212,255,.3);border-right:1.5px solid rgba(0,212,255,.3)}
.card-corner.bl{bottom:10px;left:10px;border-bottom:1.5px solid var(--line2);border-left:1.5px solid var(--line2)}
.card-corner.br{bottom:10px;right:10px;border-bottom:1.5px solid var(--line2);border-right:1.5px solid var(--line2)}

.icon-wrap{display:flex;justify-content:center;margin-bottom:20px}
.icon-circle{width:56px;height:56px;border-radius:50%;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.25);display:flex;align-items:center;justify-content:center}
.icon-circle svg{width:24px;height:24px;stroke:var(--cyan);stroke-width:1.5;fill:none}

.card-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:1.5px;color:var(--w0);text-align:center;margin-bottom:6px}
.card-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--w4);text-align:center;margin-bottom:28px}

.field{margin-bottom:18px}
.field-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--w3);display:block;margin-bottom:8px}
.field-wrap{position:relative}
.f-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--w4);stroke-width:1.5;fill:none;pointer-events:none}
.field-input{width:100%;height:48px;background:var(--ink4);border:1px solid var(--line2);border-radius:8px;padding:0 40px 0 40px;font-family:'DM Mono',monospace;font-size:13px;color:var(--w1);outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:.5px}
.field-input::placeholder{color:var(--w4);font-size:11px}
.field-input:focus{border-color:rgba(0,212,255,.4);box-shadow:0 0 0 3px rgba(0,212,255,.05)}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--w4);display:flex;padding:4px;transition:color .2s}
.eye-btn:hover{color:var(--w2)}
.eye-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.5;fill:none}

/* Barra de fuerza */
.strength-wrap{margin-top:8px}
.strength-track{height:3px;background:var(--ink4);border-radius:2px;overflow:hidden}
.strength-bar{height:100%;width:0%;border-radius:2px;transition:width .3s,background-color .3s}
.strength-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;margin-top:5px;transition:color .3s}

/* Requisitos */
.req-list{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.req{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;color:var(--w4);letter-spacing:.5px}
.req-dot{width:5px;height:5px;border-radius:50%;background:var(--w4);flex-shrink:0;transition:background .3s}
.req.met .req-dot{background:var(--green)}
.req.met{color:var(--w3)}

.btn{width:100%;height:50px;margin-top:20px;background:linear-gradient(135deg,var(--navy),#001f52);border:1px solid rgba(0,212,255,.2);border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#fff;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,212,255,.15)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .spinner{display:block}
.btn.loading .btn-txt{display:none}

.err{display:none;align-items:flex-start;gap:8px;border-radius:7px;padding:11px 14px;margin-top:16px;background:rgba(192,6,19,.1);border:1px solid rgba(192,6,19,.3)}
.err.show{display:flex}
.err.success{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.3)}
.err.success .err-txt{color:#00e676}
.err.success .err-ico{color:#00e676}
.err-ico{flex-shrink:0;margin-top:1px}
.err-txt{font-family:'DM Mono',monospace;font-size:11px;color:#ff6b6b;letter-spacing:.3px;line-height:1.5}

.back-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--w4);text-decoration:none;text-transform:uppercase;transition:color .2s}
.back-link:hover{color:var(--w2)}
</style>
</head>
<body>

<div class="center">
  <div class="brand">
    <div class="brand-hex">IN</div>
    <div>
      <div class="brand-name">INLOP</div>
      <div class="brand-sub">Integral Logistics Operations</div>
    </div>
  </div>

  <div class="card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>

    <div class="icon-wrap">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
    </div>

    <div class="card-title">Nueva contraseña</div>
    <div class="card-sub">Crea una contraseña segura para tu cuenta</div>

    <!-- id="reset-form" requerido por reset-password.js -->
    <form id="reset-form" novalidate>

      <div class="field">
        <label class="field-label" for="pwd">Nueva contraseña</label>
        <div class="field-wrap">
          <input type="password" id="pwd" class="field-input"
                 placeholder="Mínimo 8 caracteres"
                 required autocomplete="new-password"/>
          <svg class="f-ico" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <!-- id="eye-btn-1" requerido por reset-password.js -->
          <button type="button" class="eye-btn" id="eye-btn-1" aria-label="Mostrar contraseña">
            <svg id="eye-ico-1" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Barra de fuerza -->
        <div class="strength-wrap">
          <div class="strength-track">
            <div class="strength-bar" id="strength-bar"></div>
          </div>
          <div class="strength-label" id="strength-label"></div>
        </div>
      </div>

      <!-- Requisitos visuales -->
      <div class="req-list">
        <div class="req" id="req-length">  <div class="req-dot"></div>8+ caracteres</div>
        <div class="req" id="req-upper">   <div class="req-dot"></div>1 mayúscula</div>
        <div class="req" id="req-number">  <div class="req-dot"></div>1 número</div>
        <div class="req" id="req-special"> <div class="req-dot"></div>1 símbolo (recom.)</div>
      </div>

      <div class="field" style="margin-top:18px">
        <label class="field-label" for="pwd-confirm">Confirmar contraseña</label>
        <div class="field-wrap">
          <input type="password" id="pwd-confirm" class="field-input"
                 placeholder="Repite la contraseña"
                 required autocomplete="new-password"/>
          <svg class="f-ico" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <!-- id="eye-btn-2" requerido por reset-password.js -->
          <button type="button" class="eye-btn" id="eye-btn-2" aria-label="Mostrar confirmación">
            <svg id="eye-ico-2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn" id="btn">
        <div class="spinner"></div>
        <span class="btn-txt">Actualizar contraseña →</span>
      </button>

      <div class="err" id="err">
        <span class="err-ico">⚠</span>
        <span class="err-txt" id="err-msg"></span>
      </div>
    </form>

    <a href="login.html" class="back-link">← Volver al login</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/reset-password.js"></script>
<script>
// Requisitos visuales en tiempo real (complementa el indicador de fuerza de reset-password.js)
document.addEventListener('DOMContentLoaded', () => {
  const pwdInput = document.getElementById('pwd');
  if (!pwdInput) return;
  pwdInput.addEventListener('input', (e) => {
    const v = e.target.value;
    document.getElementById('req-length') .classList.toggle('met', v.length >= 8);
    document.getElementById('req-upper')  .classList.toggle('met', /[A-Z]/.test(v));
    document.getElementById('req-number') .classList.toggle('met', /[0-9]/.test(v));
    document.getElementById('req-special').classList.toggle('met', /[^A-Za-z0-9]/.test(v));
  });
});
</script>
</body>
</html>
