<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INLOP · Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@500;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   INLOP LOGIN · DESIGN SYSTEM v2 · MODO CLARO EJECUTIVO
   ═══════════════════════════════════════════════════════════ */
:root{
  --syne:'Mortend','Anton','Bebas Neue',sans-serif;
  --syne-alt:'DIN Condensed','Barlow Condensed','Saira Condensed',sans-serif;
  --mono:'JetBrains Mono','DM Mono','Roboto Mono',monospace;
  --sans:'DM Sans',system-ui,sans-serif;

  --inlop-red:#E10613;
  --inlop-red-hi:#F02030;
  --inlop-navy:#012A6B;

  --bg:#F5F7FA;
  --bg1:#FFFFFF;
  --bg2:#F9FAFC;
  --bg3:#EEF2F8;
  --border:rgba(1,42,107,0.08);
  --border2:rgba(1,42,107,0.16);
  --text0:#0A0E27;
  --text1:#374151;
  --text2:#6B7280;
  --text3:#9CA3AF;

  --green:#00875F;
  --green-bg:rgba(0,135,95,.08);
  --red-bg:rgba(225,6,19,.06);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--sans);overflow:hidden;color:var(--text0)}

/* Línea gradiente corporativa superior */
body::before{content:'';position:fixed;top:0;left:0;right:0;height:2px;z-index:9999;background:linear-gradient(90deg,var(--inlop-navy) 0%,var(--inlop-red) 50%,var(--inlop-navy) 100%)}

/* Background pattern sutil */
.bg-pattern{position:fixed;inset:0;z-index:0;background-image:radial-gradient(circle at 20% 30%,rgba(225,6,19,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(1,42,107,0.05) 0%,transparent 50%);pointer-events:none}

.center{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fadeUp .6s ease both;padding-top:48px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* MARCA */
.brand{display:flex;flex-direction:column;align-items:center;margin-bottom:36px}
.brand-name{font-family:var(--syne);font-weight:400;font-size:46px;letter-spacing:.18em;color:var(--inlop-navy);line-height:1}
.brand-sub{font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--text2);text-transform:uppercase;margin-top:10px;font-weight:500}

/* CARD */
.card{width:100%;max-width:400px;background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:38px 36px;position:relative;box-shadow:0 4px 24px rgba(1,42,107,0.06)}
.card-corner{position:absolute;width:14px;height:14px}
.card-corner.tl{top:10px;left:10px;border-top:1.5px solid rgba(225,6,19,0.5);border-left:1.5px solid rgba(225,6,19,0.5)}
.card-corner.tr{top:10px;right:10px;border-top:1.5px solid rgba(225,6,19,0.5);border-right:1.5px solid rgba(225,6,19,0.5)}
.card-corner.bl{bottom:10px;left:10px;border-bottom:1.5px solid var(--border2);border-left:1.5px solid var(--border2)}
.card-corner.br{bottom:10px;right:10px;border-bottom:1.5px solid var(--border2);border-right:1.5px solid var(--border2)}

.card-title{font-family:var(--syne-alt);font-size:22px;font-weight:700;letter-spacing:.1em;color:var(--inlop-navy);text-align:center;margin-bottom:6px;text-transform:uppercase}
.card-sub{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);text-align:center;margin-bottom:28px;font-weight:500}

/* FIELDS */
.field{margin-bottom:18px}
.field-label{font-family:var(--mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--text1);display:block;margin-bottom:7px;font-weight:500}
.field-wrap{position:relative}
.f-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text3);stroke-width:1.5;fill:none;pointer-events:none;transition:stroke .2s}
.field-input{width:100%;height:46px;background:var(--bg2);border:1px solid rgba(1,42,107,0.12);border-radius:8px;padding:0 13px 0 40px;font-family:var(--mono);font-size:13px;color:var(--text0);outline:none;transition:all .2s;letter-spacing:.5px}
.field-input::placeholder{color:var(--text3);font-size:11px;letter-spacing:0}
.field-input:focus{border-color:rgba(1,42,107,0.4);background:var(--bg1);box-shadow:0 0 0 3px rgba(1,42,107,0.08)}
.field-input:focus ~ .f-ico{stroke:var(--inlop-navy)}

.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);display:flex;padding:4px;transition:color .2s}
.eye-btn:hover{color:var(--text1)}
.eye-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.5;fill:none}

.forgot-link{display:block;text-align:right;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--text2);text-decoration:none;margin-top:-8px;margin-bottom:18px;transition:color .2s}
.forgot-link:hover{color:var(--inlop-red)}

/* BOTÓN — siempre visible, no se oculta durante el loading */
.btn{width:100%;height:46px;background:var(--inlop-red);border:none;border-radius:8px;font-family:var(--syne-alt);font-size:14px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;box-shadow:0 2px 8px rgba(225,6,19,0.15);position:relative}
.btn:hover{background:var(--inlop-red-hi);box-shadow:0 8px 24px rgba(225,6,19,0.3)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.7;cursor:wait}
.btn-arrow{font-size:18px;transition:transform .2s}
.btn:hover .btn-arrow{transform:translateX(3px)}

/* Spinner DENTRO del botón sin ocultar el texto */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .spinner{display:block}
.btn.loading .btn-arrow{display:none}
/* IMPORTANTE: ya NO ocultamos .btn-txt — el botón muestra spinner + texto */

/* ERROR */
.err{display:none;align-items:center;gap:10px;border-radius:7px;padding:11px 14px;margin-top:16px;background:var(--red-bg);border:1px solid rgba(225,6,19,0.25)}
.err.show{display:flex}
.err.success{background:var(--green-bg);border-color:rgba(0,135,95,0.3)}
.err.success .err-txt{color:var(--green)}
.err > span:first-child{color:var(--inlop-red);font-size:14px;flex-shrink:0}
.err.success > span:first-child{color:var(--green)}
.err-txt{font-family:var(--mono);font-size:11px;color:var(--inlop-red);letter-spacing:.3px;line-height:1.4}

/* SEGURIDAD */
.sec{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:22px;padding:8px;border-radius:6px;background:var(--green-bg);border:1px solid rgba(0,135,95,0.15)}
.sec-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;box-shadow:0 0 4px var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sec-txt{font-family:var(--mono);font-size:8px;letter-spacing:.18em;color:var(--text2);text-transform:uppercase;font-weight:500}

/* SUCCESS OVERLAY */
.sov{position:fixed;inset:0;z-index:200;background:var(--bg1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity .5s}
.sov.show{opacity:1;pointer-events:all}
.sov-ring{width:72px;height:72px;border-radius:50%;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--green);box-shadow:0 0 40px rgba(0,135,95,.2);animation:rp 1.5s ease infinite}
@keyframes rp{0%,100%{box-shadow:0 0 20px rgba(0,135,95,.2)}50%{box-shadow:0 0 50px rgba(0,135,95,.4)}}
.sov-name{font-family:var(--syne-alt);font-size:24px;font-weight:700;letter-spacing:.15em;color:var(--inlop-navy);text-transform:uppercase}
.sov-sub{font-family:var(--mono);font-size:9px;letter-spacing:.25em;color:var(--text2);text-transform:uppercase}
.sov-red{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--green);text-transform:uppercase}

@media(max-width:480px){
  .brand-name{font-size:38px}
  .card{padding:32px 26px}
}
</style>
</head>
<body>
<div class="bg-pattern"></div>

<div class="center">
  <div class="brand">
    <div class="brand-name">INLOP</div>
    <div class="brand-sub">Business Intelligence</div>
  </div>

  <div class="card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>

    <div class="card-title">Bienvenido</div>
    <div class="card-sub">Ingresa tus credenciales para continuar</div>

    <!-- id="login-form" es requerido por login.js -->
    <form id="login-form" novalidate>
      <div class="field">
        <label class="field-label" for="email">Correo corporativo</label>
        <div class="field-wrap">
          <input type="email" id="email" class="field-input"
                 placeholder="usuario@inlop.com.co"
                 required autocomplete="email"/>
          <svg class="f-ico" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="pwd">Contraseña</label>
        <div class="field-wrap">
          <input type="password" id="pwd" class="field-input"
                 placeholder="••••••••••••"
                 required autocomplete="current-password"
                 style="padding-right:40px"/>
          <svg class="f-ico" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <!-- id="eye-btn" es detectado por login.js -->
          <button type="button" class="eye-btn" id="eye-btn" aria-label="Mostrar contraseña">
            <svg id="eye-ico" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <a href="forgot-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>

      <button type="submit" class="btn" id="btn">
        <div class="spinner"></div>
        <span class="btn-txt">Ingresar al sistema</span>
        <span class="btn-arrow">→</span>
      </button>

      <!-- id="err" y id="err-msg" requeridos por login.js -->
      <div class="err" id="err">
        <span>⚠</span>
        <span class="err-txt" id="err-msg"></span>
      </div>
    </form>

    <div class="sec">
      <div class="sec-dot"></div>
      <div class="sec-txt">Conexión cifrada · Supabase Auth v2</div>
    </div>
  </div>
</div>

<!-- Pantalla de éxito (controlada por login.js) -->
<div class="sov" id="sov">
  <div class="sov-ring">✓</div>
  <div class="sov-name" id="sov-name">Bienvenido</div>
  <div class="sov-sub"  id="sov-sub">—</div>
  <div class="sov-red">Ingresando al portal…</div>
</div>

<!-- ═══════════════════════════════════════════════════════
     Scripts: SIEMPRE en este orden
     1. CDN de Supabase
     2. supabase.js  (inicializa el cliente)
     3. login.js     (lógica del formulario)
     ═══════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/login.js"></script>
</body>
</html>
