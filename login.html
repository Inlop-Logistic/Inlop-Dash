<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INLOP · Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#04060e;--ink2:#080c18;--ink3:#0c1220;--ink4:#111828;
  --red:#c00613;--red2:#e0081a;
  --gold:#c8973a;
  --navy:#012A6B;
  --cyan:#00d4ff;--green:#00e676;
  --w0:#fff;--w1:#eef2f8;--w2:#b8c8dc;--w3:#6a8aaa;--w4:#3a506a;
  --line:rgba(255,255,255,.05);--line2:rgba(255,255,255,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--ink);font-family:'DM Sans',sans-serif;overflow:hidden;color:var(--w1)}

#bg{position:fixed;inset:0;z-index:0}
.overlay{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(192,6,19,.1) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 50% 100%,rgba(1,42,107,.15) 0%,transparent 55%);pointer-events:none}
.scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);opacity:.4}

.center{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fadeUp .6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Marca */
.brand{display:flex;align-items:center;gap:12px;margin-bottom:48px}
.brand-hex{width:44px;height:44px;flex-shrink:0;background:linear-gradient(135deg,var(--navy),var(--red));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;color:#fff}
.brand-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;letter-spacing:4px;text-transform:uppercase;color:var(--w0);line-height:1}
.brand-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--w4);text-transform:uppercase;margin-top:4px}

/* Card */
.card{width:100%;max-width:400px;background:rgba(8,12,24,.8);border:1px solid var(--line2);border-radius:16px;padding:40px;position:relative;overflow:hidden;backdrop-filter:blur(20px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),var(--gold),transparent)}
.card-corner{position:absolute;width:16px;height:16px}
.card-corner.tl{top:12px;left:12px;border-top:1.5px solid rgba(192,6,19,.5);border-left:1.5px solid rgba(192,6,19,.5)}
.card-corner.tr{top:12px;right:12px;border-top:1.5px solid rgba(192,6,19,.5);border-right:1.5px solid rgba(192,6,19,.5)}
.card-corner.bl{bottom:12px;left:12px;border-bottom:1.5px solid var(--line2);border-left:1.5px solid var(--line2)}
.card-corner.br{bottom:12px;right:12px;border-bottom:1.5px solid var(--line2);border-right:1.5px solid var(--line2)}

.card-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:1.5px;color:var(--w0);text-align:center;margin-bottom:6px}
.card-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--w4);text-align:center;margin-bottom:32px}

/* Fields */
.field{margin-bottom:20px}
.field-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--w3);display:block;margin-bottom:8px}
.field-wrap{position:relative}
.f-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--w4);stroke-width:1.5;fill:none;pointer-events:none;transition:stroke .2s}
.field-input{width:100%;height:48px;background:var(--ink4);border:1px solid var(--line2);border-radius:8px;padding:0 13px 0 40px;font-family:'DM Mono',monospace;font-size:13px;color:var(--w1);outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:.5px}
.field-input::placeholder{color:var(--w4);font-size:11px;letter-spacing:0}
.field-input:focus{border-color:rgba(192,6,19,.5);box-shadow:0 0 0 3px rgba(192,6,19,.08)}
.field-input:focus~.f-ico{stroke:var(--red2)}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--w4);display:flex;padding:4px;transition:color .2s;type:button}
.eye-btn:hover{color:var(--w2)}
.eye-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.5;fill:none}

/* Olvidé contraseña */
.forgot-link{display:block;text-align:right;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--w4);text-decoration:none;margin-top:-12px;margin-bottom:20px;transition:color .2s}
.forgot-link:hover{color:var(--gold)}

/* Botón */
.btn{width:100%;height:50px;margin-top:8px;background:linear-gradient(135deg,var(--red),#8a030d);border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#fff;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .15s}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 60%);pointer-events:none}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(192,6,19,.4)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-arrow{font-size:18px;transition:transform .2s}
.btn:hover .btn-arrow{transform:translateX(3px)}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .spinner{display:block}
.btn.loading .btn-txt,.btn.loading .btn-arrow{display:none}

/* Error / Info */
.err{display:none;align-items:center;gap:8px;border-radius:7px;padding:11px 14px;margin-top:16px;background:rgba(192,6,19,.1);border:1px solid rgba(192,6,19,.3)}
.err.show{display:flex}
.err.success{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.3)}
.err.success .err-txt{color:#00e676}
.err-txt{font-family:'DM Mono',monospace;font-size:11px;color:#ff6b6b;letter-spacing:.5px}

/* Seguridad */
.sec{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:24px;padding:7px;border-radius:6px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1)}
.sec-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sec-txt{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--w4);text-transform:uppercase}

/* Success overlay */
.sov{position:fixed;inset:0;z-index:200;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity .5s}
.sov.show{opacity:1;pointer-events:all}
.sov-ring{width:72px;height:72px;border-radius:50%;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 40px rgba(0,230,118,.3);animation:rp 1.5s ease infinite}
@keyframes rp{0%,100%{box-shadow:0 0 20px rgba(0,230,118,.3)}50%{box-shadow:0 0 50px rgba(0,230,118,.5)}}
.sov-name{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;letter-spacing:3px;color:var(--w0);text-transform:uppercase}
.sov-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--w4);text-transform:uppercase}
.sov-red{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--green);text-transform:uppercase}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="overlay"></div>
<div class="scanlines"></div>

<div class="center">
  <div class="brand">
    <div class="brand-hex">IN</div>
    <div>
      <div class="brand-name">INLOP</div>
      <div class="brand-sub">Integral Logistics Operations</div>
    </div>
  </div>

  <div class="card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>

    <div class="card-title">Bienvenido</div>
    <div class="card-sub">Ingresa tus credenciales para continuar</div>

    <!-- id="login-form" es requerido por login.js -->
    <form id="login-form" novalidate>
      <div class="field">
        <label class="field-label" for="email">Correo corporativo</label>
        <div class="field-wrap">
          <input type="email" id="email" class="field-input"
                 placeholder="usuario@inlop.com.co"
                 required autocomplete="email"/>
          <svg class="f-ico" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="pwd">Contraseña</label>
        <div class="field-wrap">
          <input type="password" id="pwd" class="field-input"
                 placeholder="••••••••••••"
                 required autocomplete="current-password"
                 style="padding-right:40px"/>
          <svg class="f-ico" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <!-- id="eye-btn" es detectado por login.js -->
          <button type="button" class="eye-btn" id="eye-btn" aria-label="Mostrar contraseña">
            <svg id="eye-ico" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Enlace "Olvidaste tu contraseña" -->
      <a href="forgot-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>

      <button type="submit" class="btn" id="btn">
        <div class="spinner"></div>
        <span class="btn-txt">Ingresar al sistema</span>
        <span class="btn-arrow">→</span>
      </button>

      <!-- id="err" y id="err-msg" requeridos por login.js -->
      <div class="err" id="err">
        <span>⚠</span>
        <span class="err-txt" id="err-msg"></span>
      </div>
    </form>

    <div class="sec">
      <div class="sec-dot"></div>
      <div class="sec-txt">Conexión cifrada · Supabase Auth v2</div>
    </div>
  </div>
</div>

<!-- Pantalla de éxito (controlada por login.js) -->
<div class="sov" id="sov">
  <div class="sov-ring">✓</div>
  <div class="sov-name" id="sov-name">Bienvenido</div>
  <div class="sov-sub"  id="sov-sub">—</div>
  <div class="sov-red">Ingresando al portal…</div>
</div>

<!-- ═══════════════════════════════════════════════════════
     Scripts: SIEMPRE en este orden
     1. CDN de Supabase
     2. supabase.js  (inicializa el cliente)
     3. login.js     (lógica del formulario)
     ═══════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/login.js"></script>
</body>
</html>
