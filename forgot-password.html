<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INLOP · Recuperar contraseña</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#04060e;--ink2:#080c18;--ink3:#0c1220;--ink4:#111828;
  --red:#c00613;--red2:#e0081a;--gold:#c8973a;--navy:#012A6B;
  --cyan:#00d4ff;--green:#00e676;
  --w0:#fff;--w1:#eef2f8;--w2:#b8c8dc;--w3:#6a8aaa;--w4:#3a506a;
  --line:rgba(255,255,255,.05);--line2:rgba(255,255,255,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--ink);font-family:'DM Sans',sans-serif;overflow:hidden;color:var(--w1)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(192,6,19,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 50% 100%,rgba(1,42,107,.12) 0%,transparent 55%);pointer-events:none;z-index:0}

.center{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fadeUp .6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.brand{display:flex;align-items:center;gap:12px;margin-bottom:40px}
.brand-hex{width:40px;height:40px;flex-shrink:0;background:linear-gradient(135deg,var(--navy),var(--red));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;color:#fff}
.brand-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:4px;text-transform:uppercase;color:var(--w0);line-height:1}
.brand-sub{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--w4);text-transform:uppercase;margin-top:3px}

.card{width:100%;max-width:400px;background:rgba(8,12,24,.85);border:1px solid var(--line2);border-radius:16px;padding:40px;position:relative;overflow:hidden;backdrop-filter:blur(20px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--red),transparent)}
.card-corner{position:absolute;width:14px;height:14px}
.card-corner.tl{top:10px;left:10px;border-top:1.5px solid rgba(200,151,58,.4);border-left:1.5px solid rgba(200,151,58,.4)}
.card-corner.tr{top:10px;right:10px;border-top:1.5px solid rgba(200,151,58,.4);border-right:1.5px solid rgba(200,151,58,.4)}
.card-corner.bl{bottom:10px;left:10px;border-bottom:1.5px solid var(--line2);border-left:1.5px solid var(--line2)}
.card-corner.br{bottom:10px;right:10px;border-bottom:1.5px solid var(--line2);border-right:1.5px solid var(--line2)}

/* Ícono central */
.icon-wrap{display:flex;justify-content:center;margin-bottom:20px}
.icon-circle{width:56px;height:56px;border-radius:50%;background:rgba(200,151,58,.08);border:1px solid rgba(200,151,58,.3);display:flex;align-items:center;justify-content:center}
.icon-circle svg{width:24px;height:24px;stroke:var(--gold);stroke-width:1.5;fill:none}

.card-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:1.5px;color:var(--w0);text-align:center;margin-bottom:6px}
.card-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--w4);text-align:center;margin-bottom:8px;line-height:1.6}
.card-desc{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--w3);text-align:center;margin-bottom:28px;line-height:1.5}

.field{margin-bottom:20px}
.field-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--w3);display:block;margin-bottom:8px}
.field-wrap{position:relative}
.f-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--w4);stroke-width:1.5;fill:none;pointer-events:none}
.field-input{width:100%;height:48px;background:var(--ink4);border:1px solid var(--line2);border-radius:8px;padding:0 13px 0 40px;font-family:'DM Mono',monospace;font-size:13px;color:var(--w1);outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:.5px}
.field-input::placeholder{color:var(--w4);font-size:11px}
.field-input:focus{border-color:rgba(200,151,58,.5);box-shadow:0 0 0 3px rgba(200,151,58,.06)}
.field-input:disabled{opacity:.5;cursor:not-allowed}

.btn{width:100%;height:50px;margin-top:4px;background:linear-gradient(135deg,var(--gold),#8a6520);border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#fff;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .15s}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 60%);pointer-events:none}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(200,151,58,.35)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .spinner{display:block}
.btn.loading .btn-txt{display:none}

.err{display:none;align-items:flex-start;gap:8px;border-radius:7px;padding:11px 14px;margin-top:16px;background:rgba(192,6,19,.1);border:1px solid rgba(192,6,19,.3)}
.err.show{display:flex}
.err.success{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.3)}
.err.success .err-ico{color:#00e676}
.err.success .err-txt{color:#00e676}
.err-ico{flex-shrink:0;margin-top:1px}
.err-txt{font-family:'DM Mono',monospace;font-size:11px;color:#ff6b6b;letter-spacing:.3px;line-height:1.5}

.back-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--w4);text-decoration:none;text-transform:uppercase;transition:color .2s}
.back-link:hover{color:var(--w2)}
</style>
</head>
<body>

<div class="center">
  <div class="brand">
    <div class="brand-hex">IN</div>
    <div>
      <div class="brand-name">INLOP</div>
      <div class="brand-sub">Integral Logistics Operations</div>
    </div>
  </div>

  <div class="card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>

    <div class="icon-wrap">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <circle cx="12" cy="16" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>
    </div>

    <div class="card-title">Recuperar acceso</div>
    <div class="card-sub">Restablecimiento de contraseña</div>
    <div class="card-desc">Ingresa tu correo corporativo y te enviaremos un enlace para crear una nueva contraseña.</div>

    <!-- id="forgot-form" requerido por forgot-password.js -->
    <form id="forgot-form" novalidate>
      <div class="field">
        <label class="field-label" for="email">Correo corporativo</label>
        <div class="field-wrap">
          <input type="email" id="email" class="field-input"
                 placeholder="usuario@inlop.com.co"
                 required autocomplete="email"/>
          <svg class="f-ico" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
      </div>

      <button type="submit" class="btn" id="btn">
        <div class="spinner"></div>
        <span class="btn-txt">Enviar enlace</span>
      </button>

      <div class="err" id="err">
        <span class="err-ico">⚠</span>
        <span class="err-txt" id="err-msg"></span>
      </div>
    </form>

    <a href="login.html" class="back-link">← Volver al login</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/forgot-password.js"></script>
</body>
</html>
